---
- name: Add CrowdSec apt repository
  ansible.builtin.deb822_repository:
    name: CrowdSec
    uris: "https://packagecloud.io/crowdsec/crowdsec/{{ ansible_distribution | lower }}"
    suites: "{{ crowdsec_apt_suite | default(ansible_distribution_release) | lower }}"
    components: main
    signed_by: https://packagecloud.io/crowdsec/crowdsec/gpgkey
  register: crowdsec_repo

- name: Install CrowdSec and firewall bouncer
  ansible.builtin.apt:
    update_cache: "{{ crowdsec_repo.changed }}"
    pkg:
      - crowdsec
      - crowdsec-firewall-bouncer-nftables
    state: present
